[global]
type=global
endpoint_identifier_order=username,ip

; 풉칬칂풉칬칂풉칬칂 Transport 풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=172.16.0.0/12
local_net=127.0.0.0/8
external_media_address=192.168.0.100
external_signaling_address=192.168.0.100

; 풉칬칂풉칬칂풉칬칂 Multinet SIP Trunk 풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂
[multinet-registration]
type=registration
transport=transport-udp
outbound_auth=multinet-auth
server_uri=sip:YOUR_MULTINET_SIP_IP:5060   ; <-- replace
client_uri=sip:YOUR_USERNAME@YOUR_MULTINET_SIP_IP:5060  ; <-- replace
retry_interval=60

[multinet-auth]
type=auth
auth_type=userpass
username=YOUR_USERNAME       ; <-- replace
password=YOUR_PASSWORD       ; <-- replace

[multinet-aor]
type=aor
contact=sip:YOUR_MULTINET_SIP_IP:5060   ; <-- replace

[multinet]
type=endpoint
transport=transport-udp
context=inbound-calls
disallow=all
allow=ulaw
allow=alaw
dtmf_mode=rfc4733
outbound_auth=multinet-auth
aors=multinet-aor

; 풉칬칂풉칬칂풉칬칂 Local Test Softphone (MicroSIP) 풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂풉칬칂
[testphone]
type=endpoint
transport=transport-udp
context=inbound-calls
disallow=all
allow=ulaw,alaw
auth=testphone-auth
aors=testphone

[testphone-auth]
type=auth
auth_type=userpass
username=100
password=testpassword

[testphone]
type=aor
max_contacts=1

[testphone]
type=identify
endpoint=testphone
match=172.19.0.0/16
match=192.168.0.0/16
match=127.0.0.1
